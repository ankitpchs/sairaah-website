<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0F05"/>
      <stop offset="100%" stop-color="#3D2010"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#C65D2E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C65D2E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#glow)"/>
  <!-- Tent outline -->
  <polygon points="300,100 170,280 430,280" fill="none" stroke="#FAF5EF" stroke-width="3" opacity="0.75"/>
  <line x1="300" y1="100" x2="300" y2="80" stroke="#FAF5EF" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Tent entrance -->
  <path d="M268,280 Q300,235 332,280" fill="rgba(20,10,4,0.55)" stroke="#FAF5EF" stroke-width="2" opacity="0.7"/>
  <!-- People silhouettes below tent -->
  <circle cx="200" cy="308" r="14" fill="#D4A24C" opacity="0.7"/>
  <line x1="200" y1="322" x2="200" y2="355" stroke="#D4A24C" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <circle cx="300" cy="304" r="16" fill="#FAF5EF" opacity="0.8"/>
  <line x1="300" y1="320" x2="300" y2="358" stroke="#FAF5EF" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  <circle cx="400" cy="308" r="14" fill="#D4A24C" opacity="0.7"/>
  <line x1="400" y1="322" x2="400" y2="355" stroke="#D4A24C" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <!-- Stars -->
  <circle cx="100" cy="70" r="2" fill="#FAF5EF" opacity="0.5"/>
  <circle cx="500" cy="50" r="1.5" fill="#FAF5EF" opacity="0.4"/>
  <circle cx="460" cy="85" r="1.2" fill="#D4A24C" opacity="0.4"/>
  <circle cx="140" cy="55" r="1.5" fill="#FAF5EF" opacity="0.3"/>
  <!-- Caption bar -->
  <rect x="0" y="345" width="600" height="55" fill="rgba(0,0,0,0.55)"/>
  <text x="300" y="381" font-family="Georgia,'Times New Roman',serif" font-size="19" font-weight="600" fill="#FAF5EF" text-anchor="middle" opacity="0.95" letter-spacing="1.5">Community Camp</text>
</svg>
