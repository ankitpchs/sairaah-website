<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E0E08"/>
      <stop offset="100%" stop-color="#4A2A14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#D4A24C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#D4A24C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#glow)"/>
  <!-- Three women figures sitting at a workshop table -->
  <!-- Left woman -->
  <circle cx="170" cy="190" r="26" fill="#C65D2E" opacity="0.8"/>
  <path d="M140 250 L155 215 Q170 208 185 215 L200 250Z" fill="#C65D2E" opacity="0.8"/>
  <!-- Centre woman -->
  <circle cx="300" cy="180" r="30" fill="#FAF5EF" opacity="0.85"/>
  <path d="M265 248 L282 210 Q300 202 318 210 L335 248Z" fill="#FAF5EF" opacity="0.85"/>
  <!-- Right woman -->
  <circle cx="430" cy="190" r="26" fill="#C65D2E" opacity="0.8"/>
  <path d="M400 250 L415 215 Q430 208 445 215 L460 250Z" fill="#C65D2E" opacity="0.8"/>
  <!-- Table -->
  <rect x="100" y="255" width="400" height="14" rx="4" fill="#D4A24C" opacity="0.5"/>
  <!-- Venus symbol above -->
  <circle cx="300" cy="110" r="22" fill="none" stroke="#D4A24C" stroke-width="2.5" opacity="0.7"/>
  <line x1="300" y1="132" x2="300" y2="148" stroke="#D4A24C" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="291" y1="141" x2="309" y2="141" stroke="#D4A24C" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Caption bar -->
  <rect x="0" y="345" width="600" height="55" fill="rgba(0,0,0,0.55)"/>
  <text x="300" y="381" font-family="Georgia,'Times New Roman',serif" font-size="19" font-weight="600" fill="#FAF5EF" text-anchor="middle" opacity="0.95" letter-spacing="1.5">Women's Empowerment Workshop</text>
</svg>
