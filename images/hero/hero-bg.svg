<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0F05"/>
      <stop offset="50%" stop-color="#2A1A0A"/>
      <stop offset="100%" stop-color="#3D2010"/>
    </linearGradient>
    <radialGradient id="glow1" cx="28%" cy="45%" r="42%">
      <stop offset="0%" stop-color="#C65D2E" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#C65D2E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="72%" cy="58%" r="38%">
      <stop offset="0%" stop-color="#D4A24C" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#D4A24C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="20%" r="30%">
      <stop offset="0%" stop-color="#E8C070" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#E8C070" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.2" fill="#FAF5EF" opacity="0.055"/>
    </pattern>
  </defs>
  <!-- Base gradient -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Warm radial glows -->
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>
  <!-- Subtle dot texture -->
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <!-- Decorative rings (community / connection motif) -->
  <circle cx="380" cy="280" r="220" fill="none" stroke="#C65D2E" stroke-width="1.2" opacity="0.10"/>
  <circle cx="380" cy="280" r="360" fill="none" stroke="#C65D2E" stroke-width="0.8" opacity="0.06"/>
  <circle cx="1540" cy="760" r="280" fill="none" stroke="#D4A24C" stroke-width="1" opacity="0.09"/>
  <circle cx="1540" cy="760" r="440" fill="none" stroke="#D4A24C" stroke-width="0.6" opacity="0.05"/>
  <circle cx="960" cy="820" r="320" fill="none" stroke="#FAF5EF" stroke-width="0.5" opacity="0.04"/>
  <!-- Faint diagonal highlight line -->
  <line x1="0" y1="600" x2="800" y2="0" stroke="#D4A24C" stroke-width="0.6" opacity="0.06"/>
  <line x1="1120" y1="1080" x2="1920" y2="480" stroke="#D4A24C" stroke-width="0.6" opacity="0.06"/>
  <!-- Scattered star-like dots -->
  <circle cx="150" cy="120" r="2" fill="#FAF5EF" opacity="0.35"/>
  <circle cx="620" cy="80" r="1.5" fill="#FAF5EF" opacity="0.28"/>
  <circle cx="1100" cy="60" r="2" fill="#D4A24C" opacity="0.3"/>
  <circle cx="1700" cy="140" r="1.5" fill="#FAF5EF" opacity="0.25"/>
  <circle cx="1850" cy="280" r="1" fill="#FAF5EF" opacity="0.3"/>
  <circle cx="80" cy="900" r="1.8" fill="#FAF5EF" opacity="0.22"/>
  <circle cx="400" cy="980" r="1.5" fill="#D4A24C" opacity="0.25"/>
  <circle cx="1500" cy="950" r="2" fill="#FAF5EF" opacity="0.2"/>
</svg>
